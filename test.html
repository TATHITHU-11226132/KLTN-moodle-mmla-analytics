<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>MMLA Python IDE & SRL & Camera</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/codemirror.min.css">
    <script src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
    <style>
        body { font-family: Arial, sans-serif; padding: 15px; background: #f4f7f6; margin: 0; }
        .main-container { display: flex; gap: 15px; align-items: stretch; }
        .left-panel { width: 30%; display: flex; flex-direction: column; gap: 15px; }
        .right-panel { width: 70%; display: flex; flex-direction: column; }
        .camera-container { background: #000; border-radius: 8px; overflow: hidden; position: relative; border: 2px solid #ccc; }
        #webcam { width: 100%; height: auto; display: block; transform: scaleX(-1); }
        .camera-label { position: absolute; top: 10px; left: 10px; background: rgba(255,0,0,0.8); color: white; padding: 3px 8px; font-size: 12px; border-radius: 4px; font-weight: bold; animation: blink 2s infinite; }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
        .plan-card { background: #e3f2fd; border-left: 4px solid #2196f3; padding: 10px; border-radius: 4px; font-size: 13px; }
        .plan-card button { background: #2196f3; color: white; border: none; padding: 5px 10px; cursor: pointer; border-radius: 3px; margin-top: 5px; width: 100%; }
        .ide-container { border: 1px solid #ced4da; background: #fff; border-radius: 8px; padding: 15px; flex-grow: 1; display: flex; flex-direction: column; }
        .CodeMirror { border: 1px solid #ccc; border-radius: 4px; height: 250px; font-size: 15px; }
        #terminal { background: #1e1e1e; color: #00ff00; padding: 15px; height: 120px; overflow-y: auto; font-family: monospace; margin-top: 15px; border-radius: 4px; white-space: pre-wrap; }
        .action-bar { display: flex; justify-content: space-between; margin-top: 15px; }
        .btn-run { background: #28a745; color: white; border: none; padding: 10px 20px; cursor: pointer; font-weight: bold; border-radius: 5px; }
        .btn-run:disabled { background: #6c757d; cursor: not-allowed; }
        .btn-submit { background: #dc3545; color: white; border: none; padding: 10px 20px; cursor: pointer; font-weight: bold; border-radius: 5px; }
        .error-text { color: #ff4c4c !important; }
    </style>
</head>
<body>

    <div class="main-container">
        <div class="left-panel">
            <div class="camera-container">
                <div class="camera-label">🔴 Đang phân tích AI...</div>
                <video id="webcam" autoplay muted playsinline></video>
            </div>

            <div id="planning-section">
                <div class="plan-card" id="card-1">
                    <span>💡 <b>Gợi ý:</b> Hãy kiểm tra lỗi thụt lề (indentation) và dấu hai chấm.</span>
                    <button onclick="acknowledgePlan('card-1', 'Đọc gợi ý lỗi thụt lề')">Đã đọc & Áp dụng</button>
                </div>
            </div>
        </div>

        <div class="right-panel">
            <div class="ide-container">
                <h3 style="margin-top: 0;">Không gian làm bài</h3>
                
                <div id="example-section" style="background: #fff3cd; padding: 15px; border-radius: 5px; margin-bottom: 15px; border: 1px solid #ffeeba;">
                    <h5> Phân tích ví dụ:</h5>
                    <pre><code>for i in range(1, 11):
if i % 2 == 0
    print(i)</code></pre>
                    <p>Đoạn code trên bị lỗi gì?</p>
                    <select id="example-answer" class="form-control" style="width: 100%; padding: 5px; margin-bottom: 10px;">
                        <option value="">-- Chọn lỗi bạn thấy --</option>
                        <option value="syntax">Lỗi cú pháp </option>
                        <option value="logic">Lỗi logic </option>
                        <option value="indent">Lỗi thụt lề </option>
                    </select>
                    <button class="btn-run" onclick="unlockEditor()">Xác nhận & Bắt đầu sửa code</button>
                </div>

                <div id="coding-section" style="display: none;">
                    <textarea id="python-editor"># Hãy sửa lỗi đoạn code trên vào đây
for i in range(1, 11):
if i % 2 == 0
    print(i)</textarea>
                    
                    <div class="action-bar">
                        <button id="run-btn" class="btn-run" onclick="runCode()" disabled>⏳ Đang tải ...</button>
                        <button class="btn-submit" onclick="finishTest()"> Nộp bài & Tự đánh giá</button>
                    </div>
                    <div id="terminal">> Hệ thống đang khởi động...</div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/codemirror.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/mode/python/python.min.js"></script>
    <script src="https://cdn.jsdelivr.net/pyodide/v0.24.1/full/pyodide.js"></script>

    <script>
        // ==========================================
        // 0. BIẾN TOÀN CỤC
        // ==========================================
        let currentSessionID = null;
        let aiInterval;
        let pyodideReady = false;
        let pyodideInstance;
        let lastLoggedEmotion = null; 

        // ==========================================
        // 1. HÀM LẤY THÔNG TIN USER TỪ API
        // ==========================================
        async function fetchUserInfo() {
            try {
                let response = await fetch('./get_user_info.php');
                let data = await response.json();
        
                if (data.status === 'success' && data.session_id) {
                    currentSessionID = data.session_id;
                    console.log("✅ Đã kết nối Session #" + currentSessionID);
                } else {
                    alert("Vui lòng nhấn 'Bắt đầu làm bài' để kích hoạt AI!");
                    window.location.href = 'start_session.php?courseid=3';
                }
            } catch (error) {
                 console.error("Lỗi kết nối API");
            }
        }

        // ==========================================
        // 2. HÀM GỬI DỮ LIỆU VỀ SERVER
        // ==========================================
        async function logAction(category, action_detail, code_content = '', error_log = '') {
            let timestamp = Math.floor(Date.now() / 1000); 
            if (!currentSessionID) return;
            
            let payload = {
                session_id: currentSessionID,
                category: category,
                scaffold_type: 'System',
                action: action_detail,
                timecreated: timestamp,
                code_content: code_content, 
                error_log: error_log
            };

            try {
                let response = await fetch('./save_log.php', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                
                let textResponse = await response.text(); 
                try {
                    let result = JSON.parse(textResponse);
                    if (result.status === 'error') {
                        console.error("❌ LỖI DATABASE:", result.message);
                    }
                } catch (e) {
                    console.error("❌ Lỗi Moodle:", textResponse);
                }
            } catch (error) {
                console.error('❌ Mất kết nối API:', error);
            }
        }

        // ==========================================
        // 3. KHỞI TẠO CAMERA & XỬ LÝ AI TẠI MÁY TRẠM (RULE-BASED)
        // ==========================================
        async function startCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: true });
                const videoElement = document.getElementById('webcam');
                videoElement.srcObject = stream;
        
                videoElement.addEventListener('loadedmetadata', () => {
                    videoElement.width = videoElement.videoWidth || 480;
                    videoElement.height = videoElement.videoHeight || 360;
                });

                await videoElement.play();
                console.log('[Edge AI Engine] Kích hoạt thành công camera quét nét mặt!');
                
                let isCallingAI = false; 

                aiInterval = setInterval(async () => {
                    if (videoElement.paused || videoElement.ended) return;

                    try {
                        const detection = await faceapi.detectSingleFace(videoElement, new faceapi.TinyFaceDetectorOptions()).withFaceExpressions();
                        
                        if (detection) {
                            const expressions = detection.expressions;
                            let topEmotion = Object.keys(expressions).reduce((a, b) => expressions[a] > expressions[b] ? a : b);
                            let topScore = expressions[topEmotion];
                            
                            if (topScore > 0.5) { 
                                if (topEmotion !== lastLoggedEmotion && !isCallingAI) {
                                    console.log(" CẢM XÚC THAY ĐỔI! Đang tạo miêu tả tức thì trên máy trạm...");
                                    isCallingAI = true; 
                                    lastLoggedEmotion = topEmotion; 

                                    // 1. TẠO TỪ ĐIỂN MAP TRỰC TIẾP TỪ KHÓA SANG CÂU VĂN
                                    const emotionDictionary = {
                                        'neutral': 'Sinh viên đang giữ trạng thái tập trung, nét mặt bình thản.',
                                        'happy': 'Sinh viên đang mỉm cười, có vẻ thoải mái với tiến độ làm bài.',
                                        'sad': 'Sinh viên đang nhăn nhó, buồn bã, có thể đang gặp khó khăn.',
                                        'angry': 'Sinh viên đang thể hiện sự bực tức, nhíu mày mạnh, căng thẳng.',
                                        'fear': 'Sinh viên đang bối rối, lo lắng trước màn hình.',
                                        'disgusted': 'Sinh viên đang có biểu cảm khó chịu.',
                                        'surprised': 'Sinh viên đang tỏ vẻ ngạc nhiên, bất ngờ.'
                                    };

                                    let aiText = emotionDictionary[topEmotion] || 'Sinh viên đang có sự thay đổi nét mặt không xác định.';

                                    console.log("✅ [Local Edge] TẠO TƯỜNG THUẬT THÀNH CÔNG:", aiText);
                                    logAction('Multimodal', topEmotion); 

                                    isCallingAI = false; 
                                }
                            }
                        } else {
                            // ⚠️ KHỐI LỆNH XỬ LÝ KHI MẤT DẤU KHUÔN MẶT
                            if (lastLoggedEmotion !== 'NoFace') {
                                let noFaceMsg = 'Sinh viên đang mất dấu khuôn mặt, có thể đã cúi xuống, rời vị trí hoặc che camera.';
                                
                                // Báo động đỏ ra màn hình Console
                                console.log("⚠️ [CẢNH BÁO AI]:", noFaceMsg);
                                
                                // Báo động trực tiếp lên màn hình Terminal của sinh viên
                                let terminal = document.getElementById("terminal");
                                terminal.innerText = terminal.innerText + "\n> ⚠️ HỆ THỐNG GIÁM SÁT: Không tìm thấy khuôn mặt sinh viên!";
                                terminal.classList.add("error-text");
                                terminal.scrollTop = terminal.scrollHeight; // Tự động cuộn xuống dòng mới nhất
                                
                                // Ghi log vào Database Moodle
                                logAction('Multimodal', noFaceMsg);
                                
                                lastLoggedEmotion = 'NoFace';
                            }
                        }
                    } catch (error) {
                        console.error('❌ LỖI VÒNG LẶP CAMERA:', error);
                    }
                }, 3000);

            } catch (err) {
                console.error('❌ LỖI KHỞI TẠO CAMERA:', err);
                alert("Lỗi Camera: " + err.message);
            }
        }

        // ==========================================
        // 4. KHỞI TẠO PYODIDE & LOGIC CHẠY CODE
        // ==========================================
        var editor = CodeMirror.fromTextArea(document.getElementById("python-editor"), {
            mode: "python", lineNumbers: true, indentUnit: 4, theme: "default"
        });
        let typingTimer;
        let isTyping = false;

        editor.on("change", function() {
            if (!isTyping) {
                isTyping = true;
                logAction('Coding', 'PC', '', 'Đang gõ code...');
            }
            
            clearTimeout(typingTimer);
            typingTimer = setTimeout(function() {
                isTyping = false;
            }, 10000); 
        });

        async function initPython() {
            pyodideInstance = await loadPyodide();
            pyodideReady = true;
            let runBtn = document.getElementById("run-btn");
            runBtn.innerText = "▶ CHẠY CHƯƠNG TRÌNH";
            runBtn.disabled = false;
            document.getElementById('terminal').innerText = "> Sẵn sàng chạy code!";
        }

        async function runCode() {
            if (!pyodideReady) return;
            let terminal = document.getElementById("terminal");
            let code = editor.getValue(); 

            try {
                pyodideInstance.runPython(`import sys, io\nsys.stdout = io.StringIO()`);
                await pyodideInstance.runPythonAsync(code);
                let stdout = pyodideInstance.runPython("sys.stdout.getvalue()");
                terminal.innerText = "> Kết quả in ra:\n" + stdout;
                terminal.classList.remove("error-text");
                logAction('Coding', 'Success', code); 
            } catch (err) {
                terminal.innerText = "> Lỗi chương trình:\n" + err.message;
                terminal.classList.add("error-text");
                logAction('Coding', 'Error', code, err.message);
            }
        }

        // ==========================================
        // 5. LUỒNG SRL
        // ==========================================
        function acknowledgePlan(cardId, actionDesc) {
            document.getElementById(cardId).style.display = 'none';
            logAction('SRL', JSON.stringify({ type: "UGPP", act: actionDesc }));
        }

        function startTimers() {
            setTimeout(function() {
                let answer = prompt(" CẢNH BÁO THỜI GIAN: Tiến độ của bạn đến đâu rồi?");
                if(answer) logAction('SRL', JSON.stringify({ type: "UMP", act: "Trả lời Popup: " + answer }));
            }, 60000); 
        }

        function finishTest() {
            logAction('SRL', JSON.stringify({ type: "UMP", act: "Bấm nút Nộp bài" }));
            if (confirm("Nộp bài và sang phần Đánh giá?")) {
                clearInterval(aiInterval); 
                window.open("mock_evaluation.html?sessionid=" + currentSessionID, "_blank"); 
            }
        }

        // ==========================================
        // 6. KHỞI TẠO TOÀN BỘ HỆ THỐNG
        // ==========================================
        window.onload = async () => {
            console.log('[Init] 🔄 Đang tải mô hình face-api.js từ ./models...');
            try {
                await faceapi.nets.tinyFaceDetector.loadFromUri('./models');
                await faceapi.nets.faceLandmark68Net.loadFromUri('./models'); 
                await faceapi.nets.faceExpressionNet.loadFromUri('./models');
                console.log('[Init] ✅ face-api.js Sẵn sàng!');
            } catch (error) {
                document.getElementById('terminal').innerText = "❌ Lỗi: Không thể tải mô hình AI.";
                return; 
            }

            await fetchUserInfo();
            
            if (currentSessionID) {
                startCamera();
                await initPython();
                startTimers(); 
            }
        };

        function unlockEditor() {
            let answer = document.getElementById("example-answer").value;
            if (!answer) {
                alert("Vui lòng phân tích ví dụ trước khi viết code!");
                return;
            }
            
            logAction('SRL', JSON.stringify({ type: "PR", act: "Đã phân tích ví dụ" }));
            logAction('SRL', JSON.stringify({ type: "PS", act: "Chọn đáp án: " + answer }));

            document.getElementById("example-section").style.display = "none";
            document.getElementById("coding-section").style.display = "block";
            
            setTimeout(() => editor.refresh(), 100);
        }
    </script>
</body>
</html>
